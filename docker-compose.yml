services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthy365
      POSTGRES_PASSWORD: healthy365
      POSTGRES_DB: healthy365
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthy365 -d healthy365"]
      interval: 5s
      timeout: 5s
      retries: 8

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://healthy365:healthy365@db:5432/healthy365
      PORT: "4000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
